name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Generate coverage report
        run: npm run test:coverage -- --run

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update system.json for this release
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg version "$VERSION" \
             --arg manifest "https://github.com/${REPO}/releases/latest/download/system.json" \
             --arg download "https://github.com/${REPO}/releases/download/${TAG}/system.zip" \
             '.version = $version | .manifest = $manifest | .download = $download' \
             system.json > system.json.tmp
          mv system.json.tmp system.json

      - name: Package release zip
        run: |
          zip -r system.zip \
            system.json \
            template.json \
            module \
            lang \
            css \
            templates \
            assets \
            packs \
            lib \
            LICENSE.txt \
            README.md \
            CHANGELOG.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            system.json
            system.zip
          generate_release_notes: true
